<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register OAuth Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #09090b;
      --muted: #71717a;
      --border: #e4e4e7;
      --input-bg: #ffffff;
      --ring: #18181b;
      --card-bg: #ffffff;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .1), 0 1px 2px -1px rgb(0 0 0 / .1);
      --radius: 0.5rem;
      --btn-bg: #18181b;
      --btn-fg: #fafafa;
      --btn-hover: #27272a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --border: #27272a;
        --input-bg: #09090b;
        --ring: #d4d4d8;
        --card-bg: #18181b;
        --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .4), 0 1px 2px -1px rgb(0 0 0 / .4);
        --btn-bg: #fafafa;
        --btn-fg: #18181b;
        --btn-hover: #e4e4e7;
      }
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--card-shadow);
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: var(--fg);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .icon svg { color: var(--bg); }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: 0;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .form { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--fg);
    }

    input,
    textarea {
      width: 100%;
      padding: 0 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--fg);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input {
      height: 2.375rem;
    }

    textarea {
      min-height: 5rem;
      resize: vertical;
      padding-top: 0.625rem;
      line-height: 1.5;
    }

    input::placeholder,
    textarea::placeholder { color: var(--muted); }

    input:focus,
    textarea:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
    }

    input[aria-invalid="true"],
    textarea[aria-invalid="true"] {
      border-color: #ef4444;
    }

    input[aria-invalid="true"]:focus,
    textarea[aria-invalid="true"]:focus {
      box-shadow: 0 0 0 3px color-mix(in srgb, #ef4444 20%, transparent);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.4;
    }

    button[type="submit"] {
      width: 100%;
      height: 2.375rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--btn-fg);
      background: var(--btn-bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button[type="submit"]:hover { background: var(--btn-hover); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid color-mix(in srgb, var(--btn-fg) 30%, transparent);
      border-top-color: var(--btn-fg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg,
    .success-msg {
      display: none;
      font-size: 0.8125rem;
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
      line-height: 1.5;
    }

    .error-msg {
      color: #ef4444;
      background: color-mix(in srgb, #ef4444 10%, transparent);
      border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
    }

    .success-msg {
      color: #16a34a;
      background: color-mix(in srgb, #16a34a 10%, transparent);
      border: 1px solid color-mix(in srgb, #16a34a 25%, transparent);
    }

    .credentials {
      display: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      gap: 0.75rem;
      flex-direction: column;
    }

    .credential {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .credential code {
      display: block;
      width: 100%;
      overflow-wrap: anywhere;
      color: var(--fg);
      background: color-mix(in srgb, var(--muted) 12%, transparent);
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
      font-size: 0.8125rem;
      line-height: 1.4;
    }

    .footer {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    .footer a {
      color: var(--fg);
      font-weight: 500;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      .card { padding: 1.5rem; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="7" height="7" x="3" y="3" rx="1"/>
          <rect width="7" height="7" x="14" y="3" rx="1"/>
          <rect width="7" height="7" x="14" y="14" rx="1"/>
          <rect width="7" height="7" x="3" y="14" rx="1"/>
        </svg>
      </div>
      <h1>Register OAuth client</h1>
      <p class="subtitle">Create credentials for an application</p>
    </div>

    <form class="form" id="clientForm" novalidate>
      <div id="errorMsg" class="error-msg" role="alert"></div>
      <div id="successMsg" class="success-msg" role="status"></div>

      <div class="field">
        <label for="appName">App name</label>
        <input id="appName" name="appName" type="text" maxlength="100" placeholder="Acme Dashboard" required />
      </div>

      <div class="field">
        <label for="redirectUri">Redirect URL</label>
        <input id="redirectUri" name="redirectUri" type="url" placeholder="http://localhost:3000/auth/callback" required />
        <span class="hint">Users return to this URL after authentication.</span>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="contactEmail">Contact email</label>
          <input id="contactEmail" name="contactEmail" type="email" autocomplete="email" placeholder="admin@example.com" />
        </div>
        <div class="field">
          <label for="homepageUrl">Homepage URL</label>
          <input id="homepageUrl" name="homepageUrl" type="url" placeholder="https://example.com" />
        </div>
      </div>

      <div class="field">
        <label for="logoUrl">Logo URL</label>
        <input id="logoUrl" name="logoUrl" type="url" placeholder="https://example.com/logo.png" />
      </div>

      <div class="field">
        <label for="description">Extra information</label>
        <textarea id="description" name="description" maxlength="500" placeholder="What this app does, who owns it, or any notes you need later."></textarea>
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Create client</span>
      </button>

      <div id="credentials" class="credentials" aria-live="polite">
        <div class="credential">
          <label>Client ID</label>
          <code id="clientId"></code>
        </div>
        <div class="credential">
          <label>Client secret</label>
          <code id="clientSecret"></code>
          <span class="hint">Store this secret now. It will not be shown again.</span>
        </div>
      </div>
    </form>

    <div class="footer">
      Already registered? <a href="/o/authenticate">Test sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('clientForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const credentials = document.getElementById('credentials');
    const clientId = document.getElementById('clientId');
    const clientSecret = document.getElementById('clientSecret');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }

    function hideMessages() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Creating client...' : 'Create client';
    }

    function isValidHttpUrl(value) {
      if (!value) return true;
      try {
        const url = new URL(value);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch {
        return false;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      credentials.style.display = 'none';

      const payload = {
        appName: document.getElementById('appName').value.trim(),
        redirectUri: document.getElementById('redirectUri').value.trim(),
        contactEmail: document.getElementById('contactEmail').value.trim(),
        homepageUrl: document.getElementById('homepageUrl').value.trim(),
        logoUrl: document.getElementById('logoUrl').value.trim(),
        description: document.getElementById('description').value.trim(),
      };

      if (!payload.appName || !payload.redirectUri) {
        showError('Please enter an app name and redirect URL.');
        return;
      }

      if (!isValidHttpUrl(payload.redirectUri)) {
        showError('Redirect URL must be a valid http or https URL.');
        return;
      }

      if (!isValidHttpUrl(payload.homepageUrl) || !isValidHttpUrl(payload.logoUrl)) {
        showError('Optional URLs must use http or https.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/o/client', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.message || 'Something went wrong. Please try again.');
          return;
        }

        clientId.textContent = data.client_id;
        clientSecret.textContent = data.client_secret;
        credentials.style.display = 'flex';
        showSuccess('Client created successfully.');
        form.reset();
      } catch {
        showError('Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
